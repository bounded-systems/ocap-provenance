name: Publish to JSR

# Publishes @bounded-systems/ocap-provenance to JSR on a GitHub Release OR a
# pushed `v*` tag, and validates (slow-type + resolvability dry-run) on every PR
# and on demand. Auth is OIDC: once the package is linked to this repo at
# https://jsr.io/@bounded-systems/ocap-provenance, no token/secret is needed.
on:
  release:
    types: [published]
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: jsr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  jsr:
    name: jsr publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11
      - name: Validate package (dry-run)
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: bunx jsr publish --dry-run
      - name: Publish to JSR
        if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        run: bunx jsr publish
